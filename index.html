<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login page</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <section class="left">


  </section>

  <section class="right">

    <section class="border-form">

      <h1>Login page</h1>

      <div class="scl-btn">

        <button class="apple-btn" type="submit">
          <span ><img class="apple-logo" src="./apple logo.svg" alt=""></span> 
          <span >Login Apple</span>
        </button>

        <button class="fcb-btn" type="submit">
          <span><img class="fcb-logo" src="./facebook logo.svg" alt=""></span>
          <span>Login Facebook</span>
        </button>

        <button class="inst-btn" type="submit">
          <span><img class="inst-logo" src="./insta logo.svg" alt=""></span>
          <span>Login Instagram</span>
        </button>

      </div>

      <div>

        <form class="user-data" action="#" method="post">

          <div>
            <label for="email1">Email:</label>
            <input type="text" name="login" id="email1" required>
              <select name="email" id="email">
                <option value="@gmail.com">gmail.com</option>
                <option value="@mail.ru">mail.ru</option>
                <option value="@yahoo.com">yahoo.com</option>
              </select>
          </div>

          <div>
            <label for="password">Password:</label>
            <input type="password" name="login" id="password" required>
          </div>

          <div>
            <input id="rememberme" type="checkbox" value="remember-me" name="login">
            <label for="rememberme">Remember me</label>
          </div>

          <div>
            <button class="login-btn" type="submit" name="login">Login</button>
          </div>

        </form>

      </div>
      
    </section>

  </section>
  
</body>
</html>
