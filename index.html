<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login page</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <section class="left">


  </section>

  <section class="right">

    <section class="border-form">

      <h1>Login page</h1>

      <div class="scl-btn">


        <button class="apple-btn" type="submit">
          <span ><img class="apple-logo" src="./apple logo.svg" alt=""></span> 
          <span >Login Apple</span>
        </button>

        <button class="fcb-btn" type="submit">
          <span><img class="fcb-logo" src="./facebook logo.svg" alt=""></span>
          <span>Login Facebook</span>

        </button>

        <button class="inst-btn" type="submit">
          <span><img class="inst-logo" src="./insta logo.svg" alt=""></span>
          <span>Login Instagram</span>

        </button>


      </div>

      <form class="user-data" action="#" method="post">

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password" required>

        <button type="submit">Login</button>


      </form>
      
      

      




    </section>

    


  </section>
  
</body>
</html>
